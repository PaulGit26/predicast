name: CI/CD — Predicast

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND:  predicast-backend
  ECR_FRONTEND: predicast-frontend
  ECR_PIPELINE: predicast-pipeline
  K8S_NAMESPACE: predicast

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check 04_Scripts_Nuevos/lib/ tests/ --ignore E501

  # ── 2. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -v \
            --cov=04_Scripts_Nuevos/lib \
            --cov-report=term-missing \
            --cov-fail-under=60

  # ── 3. Build & Push to AWS ECR ───────────────────────────────────────────────
  build-push:
    name: Build & Push → ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion
          file:    ./07_Sistema_Produccion/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:latest

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion/frontend/nextjs
          file:    ./07_Sistema_Produccion/frontend/nextjs/Dockerfile
          push: true
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:latest

      # ── Pipeline ML ──────────────────────────────────────────────────────────
      - name: Build & push pipeline
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion/pipeline
          file:    ./07_Sistema_Produccion/pipeline/Dockerfile
          push: true
          cache-from: type=gha,scope=pipeline
          cache-to:   type=gha,scope=pipeline,mode=max
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_PIPELINE }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_PIPELINE }}:latest

  # ── 4. Deploy to AWS EKS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy → EKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production      # requires manual approval in GitHub if configured

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name predicast-production-eks

      - name: Apply K8s base manifests
        run: |
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/namespace.yaml
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/configmap.yaml
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/secrets.yaml

      - name: Update backend image & rollout
        run: |
          kubectl set image deployment/predicast-backend \
            backend=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:${{ needs.build-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/predicast-backend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Update frontend image & rollout
        run: |
          kubectl set image deployment/predicast-frontend \
            frontend=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:${{ needs.build-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/predicast-frontend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Update pipeline image & rollout
        run: |
          kubectl set image deployment/predicast-pipeline \
            pipeline=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_PIPELINE }}:${{ needs.build-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/predicast-pipeline \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Apply ingress & HPA
        run: |
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/backend-deployment.yaml
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/frontend-deployment.yaml
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/pipeline-deployment.yaml
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/redis-deployment.yaml
          kubectl apply -f 07_Sistema_Produccion/infra/kubernetes/ingress.yaml

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          echo "=== Services ==="
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.K8S_NAMESPACE }}
