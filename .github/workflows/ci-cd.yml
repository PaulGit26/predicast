name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 07_Sistema_Produccion/requirements.txt
      - name: Run tests
        run: |
          python -m pytest -q

  build-and-push:
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./07_Sistema_Produccion/frontend/nextjs
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/predicast-frontend:latest
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./07_Sistema_Produccion
          file: ./07_Sistema_Produccion/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/predicast-backend:latest
