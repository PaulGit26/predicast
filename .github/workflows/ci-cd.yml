name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check 04_Scripts_Nuevos/lib/ lib/ tests/

  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ 07_Sistema_Produccion/tests/test_pipeline_integration.py \
            -v \
            --cov=lib \
            --cov=04_Scripts_Nuevos/lib \
            --cov-report=term-missing \
            --cov-fail-under=25

  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion
          file: ./07_Sistema_Produccion/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/predicast-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion/frontend/nextjs
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/predicast-frontend:latest
