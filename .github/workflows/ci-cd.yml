name: CI/CD — Predicast

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND:  predicast-backend
  ECR_FRONTEND: predicast-frontend
  ECR_PIPELINE: predicast-pipeline

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check 04_Scripts_Nuevos/lib/ tests/ --ignore E501

  # ── 2. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -v \
            --cov=04_Scripts_Nuevos/lib \
            --cov-report=term-missing \
            --cov-fail-under=45

  # ── 3. Build & Push to AWS ECR ───────────────────────────────────────────────
  build-push:
    name: Build & Push → ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion
          file:    ./07_Sistema_Produccion/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion/frontend/nextjs
          file:    ./07_Sistema_Produccion/frontend/nextjs/Dockerfile
          push: true
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:latest

      - name: Build & push pipeline
        uses: docker/build-push-action@v5
        with:
          context: ./07_Sistema_Produccion/pipeline
          file:    ./07_Sistema_Produccion/pipeline/Dockerfile
          push: true
          cache-from: type=gha,scope=pipeline
          cache-to:   type=gha,scope=pipeline,mode=max
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_PIPELINE }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_PIPELINE }}:latest

  # ── 4. Deploy to EC2 via SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy → EC2
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy compose files and data to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/ec2.pem
          chmod 600 /tmp/ec2.pem
          SSH_OPTS="-i /tmp/ec2.pem -o StrictHostKeyChecking=no"

          # Create data directories on server
          ssh $SSH_OPTS ec2-user@$EC2_HOST "mkdir -p /home/ec2-user/predicast/data/01_Datos /home/ec2-user/predicast/data/01_Datos_Nuevos /home/ec2-user/predicast/data/03_ANALISIS_EXPLORATORIO_DATOS /home/ec2-user/predicast/data/EDA_Outputs"

          # Copy compose + nginx
          scp $SSH_OPTS \
            07_Sistema_Produccion/infra/docker-compose.prod.yml \
            07_Sistema_Produccion/infra/nginx.conf \
            ec2-user@$EC2_HOST:/home/ec2-user/predicast/

          # Copy source data files needed by the pipeline
          scp $SSH_OPTS \
            01_Datos_Nuevos/Movimientos_MayorAuxiliar_2021.csv \
            01_Datos_Nuevos/Movimientos_MayorAuxiliar_2022.csv \
            01_Datos_Nuevos/Movimientos_MayorAuxiliar_2023.csv \
            01_Datos_Nuevos/Movimientos_MayorAuxiliar_2024.csv \
            01_Datos_Nuevos/Movimientos_MayorAuxiliar_2025.csv \
            ec2-user@$EC2_HOST:/home/ec2-user/predicast/data/01_Datos_Nuevos/

          # Copy static analysis files needed by Next.js API routes
          # NOTE: prediction CSVs are NOT copied here — they are generated by the pipeline
          # on the server and must not be overwritten on every deploy.
          scp $SSH_OPTS \
            "03_ANALISIS_EXPLORATORIO_DATOS/01_VENTAS_POR_PRODUCTO.csv" \
            "03_ANALISIS_EXPLORATORIO_DATOS/04_VENTAS_POR_BODEGA.csv" \
            "03_ANALISIS_EXPLORATORIO_DATOS/05_VENTAS_POR_CANAL.csv" \
            "03_ANALISIS_EXPLORATORIO_DATOS/06_TENDENCIA_MENSUAL.csv" \
            "03_ANALISIS_EXPLORATORIO_DATOS/07_SERIE_SEMANAL_VENTAS_PRODUCCION_STOCK.csv" \
            "03_ANALISIS_EXPLORATORIO_DATOS/14_COSTO_PLANCHA_ACUMULADO_POR_PRODUCTO.csv" \
            ec2-user@$EC2_HOST:/home/ec2-user/predicast/data/03_ANALISIS_EXPLORATORIO_DATOS/
          scp $SSH_OPTS \
            03_ANALISIS_EXPLORATORIO_DATOS/08_SERIE_SEMANAL_*.csv \
            03_ANALISIS_EXPLORATORIO_DATOS/13_PLANCHA_GAP_*.csv \
            ec2-user@$EC2_HOST:/home/ec2-user/predicast/data/03_ANALISIS_EXPLORATORIO_DATOS/

      - name: Trigger pipeline and wait for completion
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/ec2.pem
          chmod 600 /tmp/ec2.pem
          SSH_OPTS="-i /tmp/ec2.pem -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=60"

          echo "Triggering pipeline..."
          ssh $SSH_OPTS ec2-user@$EC2_HOST \
            "curl -s -X POST http://localhost:5001/run | grep -q 'started\|running' || echo 'Pipeline already running'"

          echo "Waiting for pipeline to complete (max 20 min)..."
          for i in $(seq 1 120); do
            STATUS=$(ssh $SSH_OPTS ec2-user@$EC2_HOST "curl -s http://localhost:5001/status | python3 -c \"import sys,json; print(json.load(sys.stdin)['status'])\"")
            echo "  [$i/120] Pipeline status: $STATUS"
            if [ "$STATUS" = "done" ]; then
              echo "Pipeline completed successfully."
              break
            elif [ "$STATUS" = "error" ]; then
              echo "Pipeline failed. Fetching last logs..."
              ssh $SSH_OPTS ec2-user@$EC2_HOST \
                "curl -s http://localhost:5001/logs | python3 -c \"import sys,json; logs=json.load(sys.stdin); print('\n'.join(logs[-20:]))\""
              exit 1
            fi
            sleep 10
          done
          if [ "$STATUS" != "done" ]; then
            echo "Pipeline timed out after 20 minutes."
            exit 1
          fi

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_API_AUDIENCE: https://predicast-api
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
        run: |
          echo "$SSH_KEY" > /tmp/ec2.pem
          chmod 600 /tmp/ec2.pem

          # Build .env with echo (avoids heredoc YAML conflicts)
          echo "ECR_REGISTRY=${ECR_REGISTRY}"             > /tmp/deploy.env
          echo "IMAGE_TAG=${IMAGE_TAG}"                   >> /tmp/deploy.env
          echo "DB_PASSWORD=${DB_PASSWORD}"               >> /tmp/deploy.env
          echo "SECRET_KEY=${SECRET_KEY}"                 >> /tmp/deploy.env
          echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET}"       >> /tmp/deploy.env
          echo "NEXTAUTH_URL=${NEXTAUTH_URL}"             >> /tmp/deploy.env
          echo "AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}"       >> /tmp/deploy.env
          echo "AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}" >> /tmp/deploy.env
          echo "AUTH0_DOMAIN=${AUTH0_DOMAIN}"             >> /tmp/deploy.env
          echo "AUTH0_API_AUDIENCE=${AUTH0_API_AUDIENCE}" >> /tmp/deploy.env
          echo "AUTH0_MGMT_CLIENT_ID=${AUTH0_MGMT_CLIENT_ID}" >> /tmp/deploy.env
          echo "AUTH0_MGMT_CLIENT_SECRET=${AUTH0_MGMT_CLIENT_SECRET}" >> /tmp/deploy.env

          # Build deploy script with echo
          echo '#!/bin/bash'                                                           > /tmp/deploy.sh
          echo 'set -e'                                                               >> /tmp/deploy.sh
          echo 'cd /home/ec2-user/predicast'                                         >> /tmp/deploy.sh
          echo 'source .env'                                                          >> /tmp/deploy.sh
          echo 'aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$ECR_REGISTRY"' >> /tmp/deploy.sh
          echo 'docker compose -f docker-compose.prod.yml pull'                      >> /tmp/deploy.sh
          echo 'sudo touch /home/ec2-user/predicast/data/asignaciones.json && sudo chmod 666 /home/ec2-user/predicast/data/asignaciones.json' >> /tmp/deploy.sh
          echo 'docker compose -f docker-compose.prod.yml up -d --remove-orphans'   >> /tmp/deploy.sh
          echo 'docker image prune -f'                                               >> /tmp/deploy.sh

          # SCP both files then execute (ServerAliveInterval keeps connection during long docker pull)
          SSH_OPTS="-i /tmp/ec2.pem -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=60"
          scp -i /tmp/ec2.pem -o StrictHostKeyChecking=no \
            /tmp/deploy.env /tmp/deploy.sh \
            ec2-user@$EC2_HOST:/home/ec2-user/predicast/
          ssh $SSH_OPTS ec2-user@$EC2_HOST \
            "mv /home/ec2-user/predicast/deploy.env /home/ec2-user/predicast/.env && chmod +x /home/ec2-user/predicast/deploy.sh && /home/ec2-user/predicast/deploy.sh"

      - name: Verify deployment
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/ec2.pem
          chmod 600 /tmp/ec2.pem
          ssh -i /tmp/ec2.pem -o StrictHostKeyChecking=no ec2-user@$EC2_HOST \
            "docker compose -f /home/ec2-user/predicast/docker-compose.prod.yml ps"
