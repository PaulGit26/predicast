name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 07_Sistema_Produccion/requirements.txt
      
      - name: Lint with ruff
        run: |
          ruff check 07_Sistema_Produccion/src --select E,W,F
      
      - name: Type check with mypy
        run: |
          mypy 07_Sistema_Produccion/src --ignore-missing-imports || true
      
      - name: Run tests
        run: |
          pytest 07_Sistema_Produccion/tests -v --cov=07_Sistema_Produccion/src --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Safety check
        run: |
          pip install safety
          safety check --json || true

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t predicast:${{ github.sha }} 07_Sistema_Produccion/
      
      - name: Run security scan on Docker image
        run: |
          docker run --rm predicast:${{ github.sha }} pip list
