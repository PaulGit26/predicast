# DOCKER_BUILDKIT=0 required on Windows — BuildKit causes CRLF files to be copied empty
# Run with: $env:DOCKER_BUILDKIT=0; docker-compose up --build

services:

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./07_Sistema_Produccion
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENV: development
      DEBUG: "true"
      DATABASE_URL: sqlite:///predicast.db
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data/01_Datos
      LOG_LEVEL: INFO
      LOG_FORMAT: text
    volumes:
      - ./01_Datos:/data/01_Datos:ro
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend Next.js ─────────────────────────────────────────────────────────
  # Uses pre-built standalone output from host (npm run build on Windows).
  # To update: run `npm run build` in 07_Sistema_Produccion/frontend/nextjs, then restart this service.
  frontend:
    image: node:20-slim
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
      DATA_ROOT: /data
      PIPELINE_URL: http://pipeline:5001
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    volumes:
      - ./07_Sistema_Produccion/frontend/nextjs/.next/standalone:/app
      - ./07_Sistema_Produccion/frontend/nextjs/.next/static:/app/.next/static
      - ./01_Datos:/data/01_Datos:ro
      - ./03_ANALISIS_EXPLORATORIO_DATOS:/data/03_ANALISIS_EXPLORATORIO_DATOS:ro
    depends_on:
      backend:
        condition: service_healthy
      pipeline:
        condition: service_healthy

  # ── Pipeline ML ─────────────────────────────────────────────────────────────
  pipeline:
    build:
      context: ./07_Sistema_Produccion/pipeline
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      DATA_DIR: /data/01_Datos_Nuevos
      EDA_DIR:  /data/EDA_Outputs
      PRED_DIR: /data/01_Datos
    volumes:
      - ./01_Datos_Nuevos:/data/01_Datos_Nuevos:ro
      - ./04_Scripts_Nuevos/EDA_Outputs:/data/EDA_Outputs
      - ./01_Datos:/data/01_Datos
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Redis (cache de predicciones) ────────────────────────────────────────────
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
