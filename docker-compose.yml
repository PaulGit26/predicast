services:

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./07_Sistema_Produccion
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENV: development
      DEBUG: "true"
      DATABASE_URL: sqlite:///predicast.db
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data/01_Datos
      LOG_LEVEL: INFO
      LOG_FORMAT: text
    volumes:
      - ./01_Datos:/data/01_Datos:ro
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend Next.js ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./07_Sistema_Produccion/frontend/nextjs
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
      DATA_ROOT: /data
    volumes:
      - ./01_Datos:/data/01_Datos:ro
      - ./03_ANALISIS_EXPLORATORIO_DATOS:/data/03_ANALISIS_EXPLORATORIO_DATOS:ro
    depends_on:
      backend:
        condition: service_healthy

  # ── Redis (cache de predicciones) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
