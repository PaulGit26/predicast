version: '3.8'
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: predicast
      POSTGRES_PASSWORD: predicast
      POSTGRES_DB: predicast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mlflow:
    image: mlflow/mlflow:latest
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
