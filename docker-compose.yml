# DOCKER_BUILDKIT=0 required on Windows — BuildKit causes CRLF files to be copied empty
# Local dev: $env:DOCKER_BUILDKIT=0; docker-compose up --build
# Production: use Kubernetes manifests in 07_Sistema_Produccion/infra/kubernetes/

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-predicast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predicast}
      POSTGRES_DB: ${POSTGRES_DB:-predicast}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-predicast}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./07_Sistema_Produccion
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-predicast}:${POSTGRES_PASSWORD:-predicast}@postgres:5432/${POSTGRES_DB:-predicast}
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data/01_Datos
      DATA_ROOT: /data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_API_AUDIENCE: ${AUTH0_API_AUDIENCE:-}
      PIPELINE_URL: http://pipeline:5001
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_DATA: ${S3_BUCKET_DATA:-predicast-data}
    volumes:
      - ./01_Datos:/data/01_Datos:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Frontend Next.js ─────────────────────────────────────────────────────────
  # Pre-built on host: cd 07_Sistema_Produccion/frontend/nextjs && npm run build
  frontend:
    image: node:20-slim
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
      DATA_ROOT: /data
      PIPELINE_URL: http://pipeline:5001
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_CLIENT_ID: ${AUTH0_NEXTAUTH_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_NEXTAUTH_CLIENT_SECRET:-}
    volumes:
      - ./07_Sistema_Produccion/frontend/nextjs/.next/standalone:/app
      - ./07_Sistema_Produccion/frontend/nextjs/.next/static:/app/.next/static
      - ./01_Datos:/data/01_Datos:ro
      - ./03_ANALISIS_EXPLORATORIO_DATOS:/data/03_ANALISIS_EXPLORATORIO_DATOS:ro
    depends_on:
      backend:
        condition: service_healthy
      pipeline:
        condition: service_healthy

  # ── Pipeline ML ─────────────────────────────────────────────────────────────
  pipeline:
    build:
      context: ./07_Sistema_Produccion/pipeline
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      DATA_DIR: /data/01_Datos_Nuevos
      EDA_DIR: /data/EDA_Outputs
      PRED_DIR: /data/01_Datos
      DATABASE_URL: postgresql://${POSTGRES_USER:-predicast}:${POSTGRES_PASSWORD:-predicast}@postgres:5432/${POSTGRES_DB:-predicast}
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./01_Datos_Nuevos:/data/01_Datos_Nuevos:ro
      - ./04_Scripts_Nuevos/EDA_Outputs:/data/EDA_Outputs
      - ./01_Datos:/data/01_Datos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
