apiVersion: apps/v1
kind: Deployment
metadata:
  name: predicast-pipeline
  namespace: predicast
  labels:
    app: predicast
    component: pipeline
spec:
  replicas: 1        # ML pipeline: scale via Jobs, not replicas
  selector:
    matchLabels:
      app: predicast
      component: pipeline
  template:
    metadata:
      labels:
        app: predicast
        component: pipeline
    spec:
      serviceAccountName: predicast-pipeline-sa
      containers:
        - name: pipeline
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/predicast-pipeline:latest
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: predicast-config
            - secretRef:
                name: predicast-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: predicast-pipeline
  namespace: predicast
spec:
  selector:
    app: predicast
    component: pipeline
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP
