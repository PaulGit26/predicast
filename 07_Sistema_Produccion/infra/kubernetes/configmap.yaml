apiVersion: v1
kind: ConfigMap
metadata:
  name: predicast-config
  namespace: predicast
data:
  ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  API_PORT: "8000"
  REDIS_CACHE_TTL: "3600"
  AWS_REGION: "us-east-1"
  S3_BUCKET_DATA: "predicast-data"
  S3_BUCKET_MODELS: "predicast-models"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  PREFECT_API_URL: "http://prefect:4200/api"
