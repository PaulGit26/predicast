# TEMPLATE ONLY — do not store real secrets in git.
# In production use AWS Secrets Manager + External Secrets Operator:
#   https://external-secrets.io/
# Or populate with:
#   kubectl create secret generic predicast-secrets -n predicast \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=REDIS_URL='redis://...' \
#     --from-literal=JWT_SECRET_KEY='...' \
#     --from-literal=AUTH0_DOMAIN='...' \
#     --from-literal=AUTH0_API_AUDIENCE='...' \
#     --from-literal=AWS_ACCESS_KEY_ID='...' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='...' \
#     --from-literal=NEXTAUTH_SECRET='...'
apiVersion: v1
kind: Secret
metadata:
  name: predicast-secrets
  namespace: predicast
type: Opaque
stringData:
  DATABASE_URL: "postgresql://predicast:CHANGE_ME@rds-endpoint:5432/predicast"
  REDIS_URL: "redis://elasticache-endpoint:6379/0"
  JWT_SECRET_KEY: "CHANGE_ME"
  AUTH0_DOMAIN: "your-tenant.auth0.com"
  AUTH0_API_AUDIENCE: "https://api.predicast.com"
  AUTH0_CLIENT_ID: "CHANGE_ME"
  AUTH0_CLIENT_SECRET: "CHANGE_ME"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  NEXTAUTH_SECRET: "CHANGE_ME"
  NEXTAUTH_URL: "https://app.predicast.com"
