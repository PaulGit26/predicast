apiVersion: apps/v1
kind: Deployment
metadata:
  name: predicast-backend
  namespace: predicast
  labels:
    app: predicast
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: predicast
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: predicast
        component: backend
    spec:
      serviceAccountName: predicast-backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/predicast-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: predicast-config
            - secretRef:
                name: predicast-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: predicast-backend
  namespace: predicast
spec:
  selector:
    app: predicast
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: predicast-backend-hpa
  namespace: predicast
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: predicast-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
