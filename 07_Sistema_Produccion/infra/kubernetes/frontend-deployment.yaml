apiVersion: apps/v1
kind: Deployment
metadata:
  name: predicast-frontend
  labels:
    app: predicast
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predicast
      component: frontend
  template:
    metadata:
      labels:
        app: predicast
        component: frontend
    spec:
      containers:
        - name: predicast-frontend
          image: your-registry/predicast-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
