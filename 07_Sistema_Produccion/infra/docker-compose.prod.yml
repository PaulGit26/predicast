services:
  backend:
    image: ${ECR_REGISTRY}/predicast-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://predicast:${DB_PASSWORD}@postgres:5432/predicast
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_API_AUDIENCE: ${AUTH0_API_AUDIENCE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${ECR_REGISTRY}/predicast-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_API_AUDIENCE: ${AUTH0_API_AUDIENCE}
      AUTH0_MGMT_CLIENT_ID: ${AUTH0_MGMT_CLIENT_ID}
      AUTH0_MGMT_CLIENT_SECRET: ${AUTH0_MGMT_CLIENT_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXTAUTH_URL}/api
      BACKEND_URL: http://backend:8000
      DATA_ROOT: /data
      PIPELINE_URL: http://pipeline:5001
    volumes:
      - /home/ec2-user/predicast/data:/data

  pipeline:
    image: ${ECR_REGISTRY}/predicast-pipeline:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://predicast:${DB_PASSWORD}@postgres:5432/predicast
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data/01_Datos_Nuevos
      EDA_DIR: /data/EDA_Outputs
      PRED_DIR: /data/01_Datos
      ANALISIS_DIR: /data/03_ANALISIS_EXPLORATORIO_DATOS
    volumes:
      - /home/ec2-user/predicast/data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: predicast
      POSTGRES_USER: predicast
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predicast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
